name: Build

on:
  push:
    branches: [master, main, dev]
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  LLVM_VERSION: 22.1.3
  TARGET_NOVENDOR: wasm32-linux-muslwali

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
            llvm-platform: Linux-X64
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
            llvm-platform: Linux-ARM64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Download LLVM ${{ env.LLVM_VERSION }} (slim)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/llvm"
          curl -fL "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/LLVM-${LLVM_VERSION}-${{ matrix.llvm-platform }}.tar.xz" \
            | tar -xJ -C "$GITHUB_WORKSPACE/llvm" --strip-components=1 --wildcards \
              '*/bin/clang-22' '*/bin/clang' '*/bin/clang++' \
              '*/bin/llvm-ar' '*/bin/llvm-ranlib' \
              '*/lib/clang/*'

      - name: Generate config.mak
        run: |
          cat > config.mak <<EOF
          # Generated by wali-musl CI — mirrors WALI/Makefile's musl_config target
          SHARED_LIBS =
          COMPILER_BIN = $GITHUB_WORKSPACE/llvm/bin
          AR = \$(COMPILER_BIN)/\$(CROSS_COMPILE)ar
          RANLIB = \$(COMPILER_BIN)/\$(CROSS_COMPILE)ranlib
          CC = \$(COMPILER_BIN)/clang
          ARCH = wasm32
          CROSS_COMPILE = llvm-
          prefix = $GITHUB_WORKSPACE/sysroot
          bindir = $GITHUB_WORKSPACE/sysroot/bin
          EOF
          cat config.mak

      - name: Build and install wali-musl
        run: make -j$(nproc) install

      - name: Stage crt objects under lib/${{ env.TARGET_NOVENDOR }}
        run: |
          mkdir -p "sysroot/lib/${TARGET_NOVENDOR}"
          cp sysroot/lib/*.o "sysroot/lib/${TARGET_NOVENDOR}/"

      - name: Verify sysroot artifacts
        run: |
          set -e
          SYSROOT="$GITHUB_WORKSPACE/sysroot"
          LIB="$SYSROOT/lib"
          LIB_TARGET="$LIB/$TARGET_NOVENDOR"

          echo "=== $LIB ==="
          ls -la "$LIB"
          echo "=== $LIB_TARGET ==="
          ls -la "$LIB_TARGET"

          missing=0
          check() {
            if [ -e "$1" ]; then
              echo "  ok  $1"
            else
              echo "::error::missing $1"
              missing=1
            fi
          }

          for f in crt1.o crt1-command.o libc.a libpthread.a libm.a; do
            check "$LIB/$f"
          done

          shopt -s nullglob
          crts=( "$LIB_TARGET"/*.o )
          if [ ${#crts[@]} -eq 0 ]; then
            echo "::error::no crt .o files under $LIB_TARGET"
            missing=1
          else
            echo "  ok  ${#crts[@]} crt objects under lib/$TARGET_NOVENDOR"
          fi

          exit $missing

      - name: Verify artifacts are wasm32
        run: |
          set -e
          LIB="$GITHUB_WORKSPACE/sysroot/lib"
          # Cheap magic-number check: WASM object files start with \0asm
          for f in "$LIB/crt1.o" "$LIB/crt1-command.o"; do
            magic=$(head -c 4 "$f" | od -An -c | tr -d ' \n')
            if [ "$magic" != '\0asm' ]; then
              echo "::error::$f is not a wasm object (magic=$magic)"
              exit 1
            fi
            echo "  ok  $f is wasm"
          done
          # libc.a is a thin/regular archive — just confirm ar can read it
          "$GITHUB_WORKSPACE/llvm/bin/llvm-ar" t "$LIB/libc.a" | head -5
          echo "  ok  libc.a readable ($(${GITHUB_WORKSPACE}/llvm/bin/llvm-ar t $LIB/libc.a | wc -l) members)"

      - name: Upload sysroot
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-${{ matrix.arch }}
          path: sysroot/
          retention-days: 7
